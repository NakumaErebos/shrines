# This is an example neoforge.mods.toml file.
modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}" #mandatory
license="${mod_license}"

[[mods]] #mandatory
modId="${mod_id}" #mandatory
version="${mod_version}" #mandatory
displayName="${mod_name}" #mandatory
description='''
${mod_description}
'''

# Abhängigkeit zu NeoForge selbst
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

# Abhängigkeit zu Minecraft
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# --- HIER IST DIE NEUE ABHÄNGIGKEIT ZU PARAGLIDER ---
[[dependencies.${mod_id}]]
    # Die interne Mod-ID von Paraglider ist "paraglider"
    modId="paraglider"
    # Auf "required" setzen, wenn deine Mod ohne Paraglider nicht funktionieren kann
    type="required"
    # Ein leerer Bereich oder "[0,)" akzeptiert jede Version.
    # Da du 21.1.5 nutzt, wäre "[21.1.5,)" sinnvoll für "mindestens diese Version".
    versionRange="[21.1.5,)"
    # WICHTIG: Deine Mod muss NACH Paraglider laden, damit du deren Funktionen nutzen kannst
    ordering="AFTER"
    side="BOTH"